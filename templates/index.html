<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talking Avatar AI</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="loader">
      <div class="spinner"></div>
      <p>Loading avatar...</p>
    </div>

    <div id="overlay">
      <div id="header">
        <h1>Digital Human</h1>
        <p id="status-text">Type a message and press enter to chat with the AI.</p>
      </div>

      <div id="chat-bar">
        <button id="mic-btn" title="Record voice">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            width="24"
            height="24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z"
            />
          </svg>
        </button>
        <input
          id="chat-input"
          type="text"
          placeholder="Type a message..."
          autocomplete="off"
        />
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Pose Controls Panel (Right Side) -->
    <div id="pose-panel">
      <button id="pose-toggle-btn" title="Toggle Pose Controls">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="20" height="20">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 1 1-3 0m3 0a1.5 1.5 0 1 0-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m-9.75 0h9.75" />
        </svg>
        <span>Pose Controls</span>
      </button>
      <div class="pose-panel-content"></div>
      <button id="copy-pose-btn" class="pose-btn pose-copy-btn">Copy Values</button>
    </div>

    <script type="module" src="/static/js/app.js"></script>
  </body>
</html>
